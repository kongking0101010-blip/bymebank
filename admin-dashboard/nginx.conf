server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip the text assets — speeds up cold loads on free-tier VPS.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Long-cache the hashed Vite assets. index.html stays at no-cache so
  # users always pick up the freshest bundle pointers.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # SPA fallback — every unknown path serves index.html so React Router
  # can take over. API calls go to a separate origin (the Spring service)
  # so we don't reverse-proxy them here.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
