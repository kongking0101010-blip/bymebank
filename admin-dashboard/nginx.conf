server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip the text assets — speeds up cold loads on free-tier VPS.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Cloudflare/Render DNS resolver so nginx can resolve the backend hostname
  # at request time (the upstream is a public Render URL, not a fixed IP).
  resolver 1.1.1.1 8.8.8.8 valid=30s;
  resolver_timeout 5s;

  # ── API proxy ───────────────────────────────────────────────────
  # The SPA calls same-origin paths like /api/v1/... . We forward those to
  # the Spring backend on Render. Using a variable for the host forces nginx
  # to resolve it per-request (avoids boot-time failure if the upstream is
  # cold). The Host header is set to the backend so Render routes correctly.
  location /api/ {
    set $backend "https://bymebank-server.onrender.com";
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host bymebank-server.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_ssl_server_name on;
    proxy_read_timeout 90s;
    proxy_connect_timeout 90s;
  }

  # Same for the bare /auth/ endpoints the backend also exposes.
  location /auth/ {
    set $backend_auth "https://bymebank-server.onrender.com";
    proxy_pass $backend_auth;
    proxy_http_version 1.1;
    proxy_set_header Host bymebank-server.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_ssl_server_name on;
    proxy_read_timeout 90s;
    proxy_connect_timeout 90s;
  }

  # Long-cache the hashed Vite assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # SPA fallback — every unknown path serves index.html so React Router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
