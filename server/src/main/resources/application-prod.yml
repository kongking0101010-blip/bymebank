# Production profile -- runs on Render against managed Postgres.
# Wire env vars in Render dashboard, never commit secrets here.
spring:
  datasource:
    # Render exposes the DB as discrete host/port/name pieces. We build the
    # JDBC URL here because Render's connectionString is postgres://… which
    # the Postgres JDBC driver does NOT accept (needs jdbc:postgresql://…).
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # 'update' (not 'validate') so Hibernate reconciles any drift between
      # the JPA entities and the ported Postgres schema on first boot. Flyway
      # still owns the base schema; this just patches missing columns/types
      # so a fresh prod DB comes up clean.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/postgresql

  data:
    redis:
      # Optional. If REDIS_URL is unset Spring uses its in-memory fallback
      # for rate-limit + nothing else (free tier, no Redis dyno required).
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 3000ms

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          # Fail fast instead of hanging forever. Render blocks outbound SMTP
          # (ports 25/465/587) at the infra level, so without these timeouts a
          # send would block the request thread indefinitely. Prod should use
          # the Brevo HTTPS API (BREVO_API_KEY) — these caps just stop a hang
          # if SMTP is ever attempted.
          connectiontimeout: 8000
          timeout: 8000
          writetimeout: 8000
          starttls:
            enable: true
            required: true

bridge:
  url: ${BRIDGE_URL:}
  token: ${BRIDGE_AUTH_TOKEN:}
  timeoutMs: 60000

app:
  bank:
    bakong:
      vps-base-url: ${APICHECKING_BASE_URL:https://apicheckpayment.onrender.com}
      vps-admin-key: ${VPS_ADMIN_KEY:}
      vps-customer-key: ${VPS_CUSTOMER_KEY:}

  platform:
    bakong-handle: ${PLATFORM_BAKONG_HANDLE:bymebank@aclb}
    merchant-name: ${PLATFORM_MERCHANT_NAME:Byme Bank Gateway}

  mail:
    from-name: ${MAIL_FROM_NAME:Byme Bank Payment Gateway}
    dashboard-url: ${APP_DASHBOARD_URL:}

  admin:
    initial-email: ${INITIAL_ADMIN_EMAIL:}

server:
  # Render injects PORT (often 10000) and routes health checks + traffic to
  # it. Bind to that, falling back to 8080 for local runs.
  port: ${PORT:8080}
  forward-headers-strategy: framework
  tomcat:
    accesslog:
      enabled: false

# Free tier has no Redis. Exclude Redis auto-config so the app doesn't hang
# trying to reach localhost:6379 on boot, and drop Redis + DB-less probes
# from the health endpoint so Render's health check passes as soon as the
# HTTP port is open.
spring.autoconfigure.exclude: >
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

management:
  health:
    redis:
      enabled: false
    # The mail health indicator opens an SMTP socket to Gmail on every
    # /actuator/health hit. On Render's free tier that probe hangs and makes
    # the health check time out, so disable it — SMTP is still used for
    # sending OTP/email at runtime, just not health-probed.
    mail:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.khmerbank: INFO
    org.springframework.security: WARN
